<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroDash | Mis Reservas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-plane-departure"></i>
            <span>AeroDash</span>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="flights.html" class="nav-link"><i class="fas fa-search"></i> Explorar Vuelos</a>
            <a href="my-bookings.html" class="nav-link active"><i class="fas fa-ticket-alt"></i> Mis Reservas</a>
            <a href="profile.html" class="nav-link"><i class="fas fa-user"></i> Mi Perfil</a>
        </div>
        <div class="nav-user">
            <i class="fas fa-user-circle"></i>
            <span id="userNameNav"></span>
            <button onclick="logout()" class="logout-icon"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <main class="main-container">
        <div class="page-header">
            <h1><i class="fas fa-ticket-alt"></i> Mis Reservas</h1>
            <p>Gestiona tus vuelos reservados y visualiza tus tickets</p>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="filterBookings('all')">Todos</button>
            <button class="tab-btn" onclick="filterBookings('active')">Activos</button>
            <button class="tab-btn" onclick="filterBookings('completed')">Completados</button>
            <button class="tab-btn" onclick="filterBookings('cancelled')">Cancelados</button>
        </div>

        <div id="bookingsList" class="bookings-list"></div>
        <div id="emptyBookings" class="empty-state" style="display: none;">
            <i class="fas fa-ticket-alt"></i>
            <h3>No tienes reservas aún</h3>
            <p>¡Explora nuestros vuelos y reserva tu próxima aventura!</p>
            <a href="flights.html" class="btn-primary">Explorar Vuelos</a>
        </div>
    </main>


    <div id="ticketModal" class="modal">
        <div class="modal-content ticket-modal">
            <div class="modal-header">
                <h2><i class="fas fa-ticket-alt"></i> Detalle de Ticket</h2>
                <button class="close-modal" onclick="closeTicketModal()">&times;</button>
            </div>
            <div id="ticketDetails"></div>
            <button onclick="downloadTicket()" class="btn-primary btn-block">
                <i class="fas fa-download"></i> Descargar Ticket (PDF)
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
