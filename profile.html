<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroDash | Mi Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-plane-departure"></i>
            <span>AeroDash</span>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="flights.html" class="nav-link"><i class="fas fa-search"></i> Explorar Vuelos</a>
            <a href="my-bookings.html" class="nav-link"><i class="fas fa-ticket-alt"></i> Mis Reservas</a>
            <a href="profile.html" class="nav-link active"><i class="fas fa-user"></i> Mi Perfil</a>
        </div>
        <div class="nav-user">
            <i class="fas fa-user-circle"></i>
            <span id="userNameNav"></span>
            <button onclick="logout()" class="logout-icon"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <main class="main-container">
        <div class="page-header">
            <h1><i class="fas fa-user-circle"></i> Mi Perfil</h1>
            <p>Administra tu información personal</p>
        </div>

        <div class="profile-container">
            <div class="profile-card">
                <div class="profile-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h2 id="profileName"></h2>
                <p id="profileEmail"></p>
                <div class="profile-stats">
                    <div class="profile-stat">
                        <div class="stat-number" id="profileTickets">0</div>
                        <div class="stat-label">Vuelos</div>
                    </div>
                    <div class="profile-stat">
                        <div class="stat-number" id="profileSpent">$0</div>
                        <div class="stat-label">Gastado</div>
                    </div>
                </div>
            </div>

            <div class="profile-form-card">
                <h3><i class="fas fa-edit"></i> Editar Información</h3>
                <form id="profileForm">
                    <div class="input-row">
                        <div class="input-group">
                            <label>Nombre</label>
                            <input type="text" id="profileNombre" required>
                        </div>
                        <div class="input-group">
                            <label>Apellido</label>
                            <input type="text" id="profileApellido" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Correo electrónico</label>
                        <input type="email" id="profileEmailInput" required>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>Documento</label>
                            <input type="text" id="profileDocumento">
                        </div>
                        <div class="input-group">
                            <label>Teléfono</label>
                            <input type="tel" id="profileTelefono">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Guardar Cambios</button>
                </form>
                <div id="profileMessage" class="message"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
